# # yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# metadata:
#     template: azd-init@1.11.1
environment:
  name: agentic-applications-for-unified-data-foundation
  location: eastus
name: agentic-applications-for-unified-data-foundation

requiredVersions:
  azd: ">= 1.15.0 != 1.23.9"

metadata:
  template: agentic-applications-for-unified-data-foundation@1.1

hooks:
  postprovision:
    windows:
      run: |
        $isWorkshop = $env:IS_WORKSHOP
        $deployApp = $env:AZURE_ENV_DEPLOY_APP
        $azureEnvOnly = $env:AZURE_ENV_ONLY
        $existingWorkspaceId = $env:EXISTING_FABRIC_WORKSPACE_ID

        if (-not ($isWorkshop -eq "true" -and $deployApp -ne "true")) {
            Write-Host "Web app URL: "
            Write-Host "$env:WEB_APP_URL" -ForegroundColor Cyan
        }

        # Fabric Workspace setup for workshop mode (when not Azure-only)
        if ($isWorkshop -eq "true" -and $azureEnvOnly -ne "true") {
            Write-Host "`n🏭 Setting up Fabric Workspace..." -ForegroundColor Yellow
            pip install azure-identity requests --quiet 2>$null
            python ./infra/scripts/fabric/setup_fabric_workspace.py
            if ($LASTEXITCODE -ne 0) {
                Write-Host "⚠️  Fabric workspace setup failed. You can set it up manually." -ForegroundColor Yellow
                Write-Host "   See: workshop/docs/01-deploy/02-setup-fabric.md" -ForegroundColor Gray
            }
        } elseif ($isWorkshop -ne "true") {
            Write-Host "`nRun the following commands in the bash terminal:"
            Write-Host "1. Create agents:"
            Write-Host "bash ./infra/scripts/agent_scripts/run_create_agents_scripts.sh" -ForegroundColor Cyan

            Write-Host "`n2. Create Fabric items:"
            Write-Host "bash ./infra/scripts/fabric_scripts/run_fabric_items_scripts.sh <fabric_workspace_id>" -ForegroundColor Cyan
        }

      shell: pwsh
      continueOnError: false
      interactive: true
    posix:
      run: |
        IS_WORKSHOP_VAL="${IS_WORKSHOP:-}"
        AZURE_ENV_ONLY_VAL="${AZURE_ENV_ONLY:-}"
        EXISTING_WS_ID="${EXISTING_FABRIC_WORKSPACE_ID:-}"

        if [ "$IS_WORKSHOP_VAL" != "true" ] || [ "$AZURE_ENV_DEPLOY_APP" = "true" ]; then
            echo "Web app URL: "
            echo $WEB_APP_URL
            echo ""
        fi

        # Fabric Workspace setup for workshop mode (when not Azure-only)
        if [ "$IS_WORKSHOP_VAL" = "true" ] && [ "$AZURE_ENV_ONLY_VAL" != "true" ]; then
            echo ""
            echo "🏭 Setting up Fabric Workspace..."
            pip install azure-identity requests --quiet 2>/dev/null
            python ./infra/scripts/fabric/setup_fabric_workspace.py || {
                echo "⚠️  Fabric workspace setup failed. You can set it up manually."
                echo "   See: workshop/docs/01-deploy/02-setup-fabric.md"
            }
        elif [ "$IS_WORKSHOP_VAL" != "true" ]; then
            echo "Run the following commands in the bash terminal:"
            echo "1. Create agents:"
            echo "bash ./infra/scripts/agent_scripts/run_create_agents_scripts.sh"
            echo ""
            echo "2. Create Fabric items:"
            echo "bash ./infra/scripts/fabric_scripts/run_fabric_items_scripts.sh <fabric_workspace_id>"
        fi

      shell: sh
      continueOnError: false
      interactive: true